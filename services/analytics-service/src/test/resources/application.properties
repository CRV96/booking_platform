# ============ Config Server (disabled in tests) ============
spring.config.import=
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Lazy init — avoid connecting to external services during context load
spring.main.lazy-initialization=true

# ============ Eureka (disabled in tests) ============
eureka.client.enabled=false

# ============ gRPC (disabled in tests) ============
grpc.server.port=-1
grpc.server.security.enabled=false

# ============ JWT Security (disabled in tests) ============
security.jwt.enabled=false

# ============ MongoDB ============
spring.data.mongodb.uri=mongodb://localhost:27017/analyticsdb-test

# ============ Redis ============
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ============ Kafka ============
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false

# ============ Logging ============
logging.file.name=${java.io.tmpdir}/logs/analytics-service-test.log
