# Disable config-server import — Testcontainers provides its own infrastructure
spring.config.import=
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Disable Eureka
eureka.client.enabled=false

# gRPC server — use random port to avoid conflicts between test classes
grpc.server.port=-1

# Cache
spring.cache.type=redis

# Hibernate — create schema from JPA entities on startup (used for test data)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Allow lazy collections to be loaded outside a transaction so Redis can serialize them
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Keycloak admin client — dummy values, not used in UserServiceImpl tests
keycloak.admin.server-url=http://localhost:9999
keycloak.admin.realm=test
keycloak.admin.client-id=test-client
keycloak.admin.client-secret=test-secret

# Keycloak auth — dummy values
keycloak.auth.server-url=http://localhost:9999
keycloak.auth.realm=test
keycloak.auth.client-id=test-client

# JWT — dummy values, not used for token validation in tests
security.jwt.enabled=true
security.jwt.jwk-set-uri=http://localhost:9999/realms/test/protocol/openid-connect/certs
security.jwt.issuer-uri=http://localhost:9999/realms/test

# Validation defaults
validation.email-pattern=^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$
validation.min-password-length=8
validation.max-password-length=128
validation.max-name-length=100
validation.max-email-length=255
