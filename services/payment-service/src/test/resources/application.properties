# Disable config-server import — Testcontainers provides its own infrastructure
spring.config.import=
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Disable Eureka
eureka.client.enabled=false

# gRPC server — disabled to avoid port conflicts
grpc.server.port=-1

# Disable mTLS in tests (no certs available)
grpc.server.security.enabled=false

# JWT — disabled in tests; no Keycloak available
security.jwt.enabled=false

# Log to a temp directory so LOG_PATH is not required in test environment
logging.file.name=${java.io.tmpdir}/logs/payment-service-test.log

# Flyway — runs against the Testcontainer PostgreSQL; JPA validates after migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JPA — validate schema built by Flyway (same as production)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Use mock gateway in tests
payment.gateway.type=mock

# Outbox — fast polling in tests, disable cleanup
outbox.poll.interval=100
outbox.cleanup.interval=3600000
outbox.cleanup.retention-hours=24
