# Disable config-server import — no config server available in tests
spring.config.import=
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Lazy init — avoid connecting to external services during context load
spring.main.lazy-initialization=true

# Disable Eureka
eureka.client.enabled=false

# Kafka — dummy bootstrap server (consumer retries in background, does not block startup)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-test-group
spring.kafka.consumer.auto-offset-reset=earliest

# Mail — dummy values
spring.mail.host=localhost
spring.mail.port=1025
notification.mail.from=test@test.com

# Disable Kafka listener auto-startup to avoid connection errors
spring.kafka.listener.auto-startup=false
