# Disable config-server import — no config server available in tests
spring.config.import=
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Lazy init — avoid connecting to external services during context load
spring.main.lazy-initialization=true

# Disable Eureka
eureka.client.enabled=false

# gRPC server — random port, no mTLS
grpc.server.port=-1
grpc.server.security.enabled=false

# JWT — dummy values
security.jwt.enabled=true
security.jwt.issuer-uri=http://localhost:9999/realms/test
security.jwt.jwk-set-uri=http://localhost:9999/realms/test/protocol/openid-connect/certs

# MongoDB — embedded or dummy (context loads but won't connect)
spring.data.mongodb.uri=mongodb://localhost:27017/ticketdb-test

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka — disable listener auto-startup to avoid connection errors
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
