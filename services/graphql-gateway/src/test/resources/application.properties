# Disable config-server import — no config server available in tests
spring.config.import=
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Lazy init — avoid connecting to external services during context load
spring.main.lazy-initialization=true

# Disable Eureka
eureka.client.enabled=false

# gRPC clients — plaintext, dummy addresses (channels are lazy)
grpc.client.user-service.address=static://localhost:9091
grpc.client.user-service.negotiation-type=PLAINTEXT
grpc.client.event-service.address=static://localhost:9093
grpc.client.event-service.negotiation-type=PLAINTEXT
grpc.client.booking-service.address=static://localhost:9094
grpc.client.booking-service.negotiation-type=PLAINTEXT
grpc.client.payment-service.address=static://localhost:9095
grpc.client.payment-service.negotiation-type=PLAINTEXT
grpc.client.ticket-service.address=static://localhost:9096
grpc.client.ticket-service.negotiation-type=PLAINTEXT
grpc.client.analytics-service.address=static://localhost:9097
grpc.client.analytics-service.negotiation-type=PLAINTEXT
grpc.client.security.enabled=false

# JWT — disable to avoid Keycloak connectivity
security.jwt.enabled=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Rate limiting
rate-limit.anonymous.limit=30
rate-limit.anonymous.window-seconds=60
rate-limit.authenticated.limit=100
rate-limit.authenticated.window-seconds=60
rate-limit.search.limit=2
rate-limit.search.window-seconds=60
