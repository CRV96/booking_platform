syntax = "proto3";

package booking.events;

option java_multiple_files = true;
option java_package = "com.booking.platform.common.events";
option java_outer_classname = "EventEventsProto";

// ============================================================================
// EVENT DOMAIN EVENTS
// ============================================================================
// Published by event-service to Kafka when an event lifecycle transition occurs.
// Consumed by: notification-service, analytics-service.

// ── EventCreatedEvent ────────────────────────────────────────────────────────
// Fired when a new event is created (status: DRAFT).

message EventCreatedEvent {
  string event_id    = 1;
  string title       = 2;
  string category    = 3;  // EventCategory enum value as string
  VenueSnapshot venue        = 4;
  string date_time   = 5;  // ISO 8601
  string organizer_id = 6;
  string timestamp   = 7;  // ISO 8601 — when this event was produced
}

// ── EventUpdatedEvent ────────────────────────────────────────────────────────
// Fired when an existing event's fields are modified.

message EventUpdatedEvent {
  string event_id         = 1;
  repeated string changed_fields = 2;  // Names of the fields that changed
  string timestamp        = 3;         // ISO 8601
}

// ── EventPublishedEvent ──────────────────────────────────────────────────────
// Fired when an event transitions DRAFT → PUBLISHED and becomes visible to users.

message EventPublishedEvent {
  string event_id    = 1;
  string title       = 2;
  string category    = 3;
  string date_time   = 4;  // ISO 8601
  string organizer_id = 5;
  string timestamp   = 6;  // ISO 8601
}

// ── EventCancelledEvent ──────────────────────────────────────────────────────
// Fired when an event is cancelled (PUBLISHED or DRAFT → CANCELLED).

message EventCancelledEvent {
  string event_id  = 1;
  string reason    = 2;
  string timestamp = 3;  // ISO 8601
}

// ── Embedded snapshot types ──────────────────────────────────────────────────
// Lightweight snapshots embedded in events — not full gRPC messages.
// Consumers get the data they need without a separate RPC call.

message VenueSnapshot {
  string name    = 1;
  string city    = 2;
  string country = 3;
}
