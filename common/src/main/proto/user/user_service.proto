syntax = "proto3";

package booking.user;

option java_multiple_files = true;
option java_package = "com.booking.platform.common.grpc.user";
option java_outer_classname = "UserServiceProto";

// ============================================================================
// USER SERVICE
// ============================================================================
// Handles all user-related operations including authentication (via Keycloak)
// and user profile management.

service UserService {
  // -------------------------------------------------------------------------
  // Authentication Operations (proxied to Keycloak)
  // -------------------------------------------------------------------------

  // Register a new user. Creates user in Keycloak and returns tokens.
  rpc Register(RegisterRequest) returns (AuthResponse);

  // Login with username/email and password. Returns tokens from Keycloak.
  rpc Login(LoginRequest) returns (AuthResponse);

  // Exchange a refresh token for new access/refresh tokens.
  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse);

  // Logout - invalidates the refresh token in Keycloak.
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // -------------------------------------------------------------------------
  // User Profile Operations
  // -------------------------------------------------------------------------

  // Get a user by their ID.
  rpc GetUser(GetUserRequest) returns (UserResponse);

  // Get a user by their username.
  rpc GetUserByUsername(GetUserByUsernameRequest) returns (UserResponse);

  // Get a user by their email.
  rpc GetUserByEmail(GetUserByEmailRequest) returns (UserResponse);

  // Update user profile (via Keycloak Admin API).
  rpc UpdateUser(UpdateUserRequest) returns (UserResponse);

  // Search users with pagination.
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
}

// ============================================================================
// AUTHENTICATION MESSAGES
// ============================================================================

message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;

  // Optional fields
  optional string phone_number = 5;
  optional string country = 6;
  optional string preferred_language = 7;
}

message LoginRequest {
  string username = 1;  // Can be username or email
  string password = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool success = 1;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  int32 expires_in = 3;          // Access token expiry in seconds
  int32 refresh_expires_in = 4;  // Refresh token expiry in seconds
  string token_type = 5;         // Usually "Bearer"

  // User info returned on successful auth
  UserInfo user = 6;
}

// ============================================================================
// USER MESSAGES
// ============================================================================

message UserInfo {
  string id = 1;
  string username = 2;
  string email = 3;
  bool email_verified = 4;
  bool enabled = 5;

  string first_name = 6;
  string last_name = 7;

  // Custom attributes
  optional string phone_number = 8;
  optional string country = 9;
  optional string preferred_language = 10;
  optional string preferred_currency = 11;
  optional string timezone = 12;
  optional string profile_picture_url = 13;

  // Notification preferences
  optional bool email_notifications = 14;
  optional bool sms_notifications = 15;

  // Timestamps (ISO 8601 format)
  string created_at = 16;

  // Roles assigned to the user
  repeated string roles = 17;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserByUsernameRequest {
  string username = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message UserResponse {
  UserInfo user = 1;
}

// ============================================================================
// UPDATE USER MESSAGES
// ============================================================================

message UpdateUserRequest {
  string user_id = 1;

  // Fields to update (only non-null fields will be updated)
  optional string first_name = 2;
  optional string last_name = 3;
  optional string email = 4;
  optional string phone_number = 5;
  optional string country = 6;
  optional string preferred_language = 7;
  optional string preferred_currency = 8;
  optional string timezone = 9;
  optional string profile_picture_url = 10;
  optional bool email_notifications = 11;
  optional bool sms_notifications = 12;
}

// ============================================================================
// SEARCH MESSAGES
// ============================================================================

message SearchUsersRequest {
  // Search term (matches username, email, first_name, last_name)
  optional string query = 1;

  // Pagination
  int32 page = 2;       // 0-indexed
  int32 page_size = 3;  // Default: 20, Max: 100
}

message SearchUsersResponse {
  repeated UserInfo users = 1;

  // Pagination info
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}
