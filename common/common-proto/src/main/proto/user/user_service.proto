syntax = "proto3";

package booking.user;

import "user/common.proto";

option java_multiple_files = true;
option java_package = "com.booking.platform.common.grpc.user";
option java_outer_classname = "UserServiceProto";

// ============================================================================
// USER SERVICE
// ============================================================================
// Handles user profile operations including retrieval, updates, and search.

service UserService {
  // Get a user by their ID.
  rpc GetUser(GetUserRequest) returns (UserResponse);

  // Get a user by their username.
  rpc GetUserByUsername(GetUserByUsernameRequest) returns (UserResponse);

  // Get a user by their email.
  rpc GetUserByEmail(GetUserByEmailRequest) returns (UserResponse);

  // Update user profile (via Keycloak Admin API).
  rpc UpdateUser(UpdateUserRequest) returns (UserResponse);

  // Search users with pagination.
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);

  // Get a user's email by their ID.
  rpc GetUserEmail(GetUserEmailRequest) returns (UserEmailResponse);

  rpc GetUsersEmails(GetUsersEmailsRequest) returns (GetUsersEmailsResponse);
}

// ============================================================================
// USER MESSAGES
// ============================================================================

message GetUserRequest {
  string user_id = 1;
}

message GetUserByUsernameRequest {
  string username = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message UserResponse {
  UserInfo user = 1;
}

message GetUserEmailRequest {
  string user_id = 1;
}

message UserEmailResponse {
  string email = 1;
}

message GetUsersEmailsRequest {
  repeated string user_ids = 1;
}

message GetUsersEmailsResponse {
  repeated string user_emails = 1;
}

// ============================================================================
// UPDATE USER MESSAGES
// ============================================================================

message UpdateUserRequest {
  string user_id = 1;

  // Fields to update (only non-null fields will be updated)
  optional string first_name = 2;
  optional string last_name = 3;
  optional string email = 4;
  optional string phone_number = 5;
  optional string country = 6;
  optional string preferred_language = 7;
  optional string preferred_currency = 8;
  optional string timezone = 9;
  optional string profile_picture_url = 10;
  optional bool email_notifications = 11;
  optional bool sms_notifications = 12;
}

// ============================================================================
// SEARCH MESSAGES
// ============================================================================

message SearchUsersRequest {
  // Search term (matches username, email, first_name, last_name)
  optional string query = 1;

  // Pagination
  int32 page = 2;       // 0-indexed
  int32 page_size = 3;  // Default: 20, Max: 100
}

message SearchUsersResponse {
  repeated UserInfo users = 1;

  // Pagination info
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}
