server.port=8087

# ============ ZIPKIN CONFIGS ================
# Turns on distributed tracing in the service.
# If this is false, no spans are created, nothing is sent to Zipkin.
management.tracing.enabled=true
# Defines where spans are sent.
# Zipkin will not receive any data if this is missing or wrong.
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Controls how many requests are traced.
management.tracing.sampling.probability=1.0
# Defines how trace IDs are passed between services.
# b3 = Zipkin standard
# Required if you want consistent traces across services
management.tracing.propagation.type=b3
# Traces outgoing HTTP calls (RestTemplate, WebClient, Feign).
management.tracing.instrumentation.http.client.enabled=true
# Traces incoming HTTP requests to your service.
management.tracing.instrumentation.http.server.enabled=true
# Adds traceId & spanId to logs.
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]

# ============ Eureka ============
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ============ gRPC SERVER ================
grpc.server.port=9097

# ============ gRPC Server mTLS ============
grpc.server.security.enabled=${GRPC_MTLS_ENABLED:true}
grpc.server.security.certificate-chain=classpath:certs/analytics-service.crt
grpc.server.security.private-key=classpath:certs/analytics-service.key
grpc.server.security.trust-certificate=classpath:certs/ca.crt

# ============ JWT Security ============
security.jwt.enabled=true
security.jwt.issuer-uri=${SECURITY_JWT_ISSUER_URI:http://localhost:8180/realms/booking-platform}
security.jwt.jwk-set-uri=${SECURITY_JWT_JWK_SET_URI:http://localhost:8180/realms/booking-platform/protocol/openid-connect/certs}

# ============ Redis (Token Blacklist) ============
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ============ MongoDB ================
spring.data.mongodb.uri=mongodb://${DB_MONGO_USERNAME}:${DB_MONGO_PASSWORD}@localhost:27017/analyticsdb?authSource=admin

# ============ Kafka ================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=analytics-service-group

# ============ Actuator ================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ============ Cache ================
analytics.cache.ttl-minutes=5

# ============ Logging ================
logging.file.name=${LOG_PATH:/tmp}/logs/analytics-service.log
