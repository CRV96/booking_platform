server.port=8080

# ============ GRAPHQL ================
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.path=/graphql
spring.graphql.schema.printer.enabled=true
spring.graphql.schema.introspection.enabled=true

# ============ gRPC CLIENT ================
# User Service connection
grpc.client.user-service.address=${GRPC_CLIENT_USER_SERVICE_ADDRESS:static://localhost:9091}
grpc.client.user-service.negotiation-type=${GRPC_CLIENT_USER_SERVICE_NEGOTIATION_TYPE:TLS}

# Event Service connection
grpc.client.event-service.address=${GRPC_CLIENT_EVENT_SERVICE_ADDRESS:static://localhost:9093}
grpc.client.event-service.negotiation-type=${GRPC_CLIENT_EVENT_SERVICE_NEGOTIATION_TYPE:TLS}

# Booking Service connection
grpc.client.booking-service.address=${GRPC_CLIENT_BOOKING_SERVICE_ADDRESS:static://localhost:9094}
grpc.client.booking-service.negotiation-type=${GRPC_CLIENT_BOOKING_SERVICE_NEGOTIATION_TYPE:TLS}

# Payment Service connection
grpc.client.payment-service.address=${GRPC_CLIENT_PAYMENT_SERVICE_ADDRESS:static://localhost:9095}
grpc.client.payment-service.negotiation-type=${GRPC_CLIENT_PAYMENT_SERVICE_NEGOTIATION_TYPE:TLS}

# Ticket Service connection
grpc.client.ticket-service.address=${GRPC_CLIENT_TICKET_SERVICE_ADDRESS:static://localhost:9096}
grpc.client.ticket-service.negotiation-type=${GRPC_CLIENT_TICKET_SERVICE_NEGOTIATION_TYPE:TLS}

# Analytics Service connection
grpc.client.analytics-service.address=${GRPC_CLIENT_ANALYTICS_SERVICE_ADDRESS:static://localhost:9097}
grpc.client.analytics-service.negotiation-type=${GRPC_CLIENT_ANALYTICS_SERVICE_NEGOTIATION_TYPE:TLS}

# ============ gRPC Client mTLS ============
# Enable mTLS for gRPC client (set to false to use plaintext)
grpc.client.security.enabled=${GRPC_MTLS_ENABLED:true}
grpc.client.security.certificate-chain=classpath:certs/graphql-gateway.crt
grpc.client.security.private-key=classpath:certs/graphql-gateway.key
grpc.client.security.trust-certificate=classpath:certs/ca.crt

# ============ ZIPKIN CONFIGS ================
# Turns on distributed tracing in the service.
# If this is false, no spans are created, nothing is sent to Zipkin.
management.tracing.enabled=true
# Defines where spans are sent.
# Zipkin will not receive any data if this is missing or wrong.
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Controls how many requests are traced.
management.tracing.sampling.probability=1.0
# Defines how trace IDs are passed between services.
# b3 = Zipkin standard
# Required if you want consistent traces across services
management.tracing.propagation.type=b3
# Traces outgoing HTTP calls (RestTemplate, WebClient, Feign).
management.tracing.instrumentation.http.client.enabled=true
# Traces incoming HTTP requests to your service.
management.tracing.instrumentation.http.server.enabled=true
# Adds traceId & spanId to logs.
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]

# ============ Eureka ============
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ============ JWT Security ============
security.jwt.enabled=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8180/realms/booking-platform}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://localhost:8180/realms/booking-platform/protocol/openid-connect/certs}

# ============ Actuator ================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ============ Redis (Rate Limiting) ============
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ============ Rate Limiting ============
rate-limit.anonymous.limit=30
rate-limit.anonymous.window-seconds=60
rate-limit.authenticated.limit=100
rate-limit.authenticated.window-seconds=60

# ============ Logging ================
logging.file.name=${LOG_PATH:/tmp}/logs/graphql-gateway.log
