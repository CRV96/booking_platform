server.port=8080

# ============ GRAPHQL ================
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.path=/graphql
spring.graphql.schema.printer.enabled=true

# ============ gRPC CLIENT ================
# User Service connection
grpc.client.user-service.address=static://localhost:9091
grpc.client.user-service.negotiation-type=TLS

# Event Service connection
grpc.client.event-service.address=static://localhost:9093
grpc.client.event-service.negotiation-type=TLS

# Booking Service connection
grpc.client.booking-service.address=static://localhost:9094
grpc.client.booking-service.negotiation-type=TLS

# Payment Service connection
grpc.client.payment-service.address=static://localhost:9095
grpc.client.payment-service.negotiation-type=TLS

# Ticket Service connection
grpc.client.ticket-service.address=static://localhost:9096
grpc.client.ticket-service.negotiation-type=TLS

# Analytics Service connection
grpc.client.analytics-service.address=static://localhost:9097
grpc.client.analytics-service.negotiation-type=TLS

# ============ gRPC Client mTLS ============
# Enable mTLS for gRPC client (set to false to use plaintext)
grpc.client.security.enabled=${GRPC_MTLS_ENABLED:true}
grpc.client.security.certificate-chain=classpath:certs/graphql-gateway.crt
grpc.client.security.private-key=classpath:certs/graphql-gateway.key
grpc.client.security.trust-certificate=classpath:certs/ca.crt

# ============ ZIPKIN CONFIGS ================
# Turns on distributed tracing in the service.
# If this is false, no spans are created, nothing is sent to Zipkin.
management.tracing.enabled=true
# Defines where spans are sent.
# Zipkin will not receive any data if this is missing or wrong.
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Controls how many requests are traced.
management.tracing.sampling.probability=1.0
# Defines how trace IDs are passed between services.
# b3 = Zipkin standard
# Required if you want consistent traces across services
management.tracing.propagation.type=b3
# Traces outgoing HTTP calls (RestTemplate, WebClient, Feign).
management.tracing.instrumentation.http.client.enabled=true
# Traces incoming HTTP requests to your service.
management.tracing.instrumentation.http.server.enabled=true
# Adds traceId & spanId to logs.
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]

# ============ Eureka ============
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ============ JWT Security ============
security.jwt.enabled=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/booking-platform
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/booking-platform/protocol/openid-connect/certs

# ============ Actuator ================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always



# ============ Logging ================
logging.file.name=${LOG_PATH}/logs/graphql-gateway.log
