server.port=8083

# ============ ZIPKIN CONFIGS ================
# Turns on distributed tracing in the service.
# If this is false, no spans are created, nothing is sent to Zipkin.
management.tracing.enabled=true
# Defines where spans are sent.
# Zipkin will not receive any data if this is missing or wrong.
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Controls how many requests are traced.
management.tracing.sampling.probability=1.0
# Defines how trace IDs are passed between services.
# b3 = Zipkin standard
# Required if you want consistent traces across services
management.tracing.propagation.type=b3
# Traces outgoing HTTP calls (RestTemplate, WebClient, Feign).
management.tracing.instrumentation.http.client.enabled=true
# Traces incoming HTTP requests to your service.
management.tracing.instrumentation.http.server.enabled=true
# Adds traceId & spanId to logs.
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]

# ============ Eureka ============
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ============ gRPC SERVER ================
grpc.server.port=9094

# ============ gRPC Server mTLS ============
grpc.server.security.enabled=${GRPC_MTLS_ENABLED:true}
grpc.server.security.certificate-chain=classpath:certs/booking-service.crt
grpc.server.security.private-key=classpath:certs/booking-service.key
grpc.server.security.trust-certificate=classpath:certs/ca.crt

# ============ JWT Security ============
security.jwt.enabled=true
security.jwt.issuer-uri=http://localhost:8180/realms/booking-platform
security.jwt.jwk-set-uri=http://localhost:8180/realms/booking-platform/protocol/openid-connect/certs

# ============ gRPC Client (event-service) ============
grpc.client.event-service.address=static://localhost:9093
grpc.client.event-service.negotiation-type=TLS

# ============ gRPC Client mTLS ============
grpc.client.security.enabled=${GRPC_MTLS_ENABLED:true}
grpc.client.security.certificate-chain=classpath:certs/booking-service.crt
grpc.client.security.private-key=classpath:certs/booking-service.key
grpc.client.security.trust-certificate=classpath:certs/ca.crt

# ============ Redis (Token Blacklist + Distributed Lock) ============
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ============ Distributed Lock ============
booking.lock.ttl=7s
booking.lock.max-retries=3
booking.lock.retry-delay=100ms

# ============ Database (PostgreSQL) ================
spring.datasource.url=jdbc:postgresql://localhost:5432/bookingdb
spring.datasource.username=${DB_POSTGRES_USERNAME:admin}
spring.datasource.password=${DB_POSTGRES_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns the schema — JPA only validates it on startup
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============ Flyway ================
# Flyway applies versioned SQL migrations from classpath:db/migration
# baseline-on-migrate handles an existing schema with no flyway_schema_history table
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============ Kafka ================
# Minimal config for P3-01 — consumers/producers configured in later tickets
spring.kafka.bootstrap-servers=localhost:9092

# ============ Actuator ================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ============ Logging ================
logging.file.name=${LOG_PATH:/tmp}/logs/booking-service.log
