server.port=8086

# ============ ZIPKIN CONFIGS ================
# Turns on distributed tracing in the service.
# If this is false, no spans are created, nothing is sent to Zipkin.
management.tracing.enabled=true
# Defines where spans are sent.
# Zipkin will not receive any data if this is missing or wrong.
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Controls how many requests are traced.
management.tracing.sampling.probability=1.0
# Defines how trace IDs are passed between services.
# b3 = Zipkin standard
# Required if you want consistent traces across services
management.tracing.propagation.type=b3
# Traces outgoing HTTP calls (RestTemplate, WebClient, Feign).
management.tracing.instrumentation.http.client.enabled=true
# Traces incoming HTTP requests to your service.
management.tracing.instrumentation.http.server.enabled=true
# Adds traceId & spanId to logs.
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]

# ============ Actuator ================
# Expose health, metrics, info and Kafka-specific endpoints over HTTP.
# By default Spring Boot only exposes /actuator/health and /actuator/info.
# "kafka" is the custom KafkaHealthIndicator registered in KafkaHealthConfig.
management.endpoints.web.exposure.include=health,info,metrics,kafka,prometheus
# Show full health details (UP/DOWN per component) instead of just "UP".
management.endpoint.health.show-details=always

# URL of the Spring Boot Admin server running in Docker.
# On registration this service sends its name, port and actuator URLs to the Admin server.
# The URL the Admin server uses to call back into this service's actuator endpoints.
# Must be reachable from inside Docker — host.docker.internal resolves to the host machine.

# ============ Eureka ============
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ============ Kafka Consumer ================
spring.kafka.bootstrap-servers=localhost:9092
# Consumer group — all instances of notification-service share this group.
# Kafka guarantees each message is delivered to exactly one instance in the group.
spring.kafka.consumer.group-id=notification-service-group
# Start from the earliest available offset when no committed offset exists.
# Ensures messages published before service starts are not lost on first boot.
spring.kafka.consumer.auto-offset-reset=earliest
# Key is a plain string (event/booking/payment ID)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Value is Protobuf binary — handled by our shared ProtobufDeserializer
spring.kafka.consumer.value-deserializer=com.booking.platform.common.events.serialization.ProtobufDeserializer

# ============ Thymeleaf ================
spring.thymeleaf.check-template-location=true

# ============ Mail (MailHog — local SMTP) ================
# MailHog is a dev-only SMTP server that catches all outgoing emails.
# It never delivers to real recipients — view emails at http://localhost:8025
spring.mail.host=localhost
spring.mail.port=1025
# MailHog requires no authentication
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
# "From" address used in all outgoing emails
notification.mail.from=noreply@booking-platform.com

# ============ Logging ================
logging.file.name=${LOG_PATH:/tmp}/logs/notification-service.log
notification.kafka.consumer-lag=false

# ============ gRPC CLIENT ================
# User Service connection
grpc.client.user-service.address=${GRPC_CLIENT_USER_SERVICE_ADDRESS:static://localhost:9091}
grpc.client.user-service.negotiation-type=${GRPC_CLIENT_USER_SERVICE_NEGOTIATION_TYPE:TLS}

# ============ gRPC Client mTLS ================
grpc.client.security.enabled=${GRPC_MTLS_ENABLED:true}
grpc.client.security.certificate-chain=classpath:certs/notification-service.crt
grpc.client.security.private-key=classpath:certs/notification-service.key
grpc.client.security.trust-certificate=classpath:certs/ca.crt

# ============ Keycloak Service Account ================
keycloak.service.token-url=${KEYCLOAK_SERVICE_TOKEN_URL:http://localhost:8180/realms/booking-platform/protocol/openid-connect/token}
keycloak.service.client-id=notification-service
keycloak.service.client-secret=${NOTIFICATION_SERVICE_KEYCLOAK_CLIENT_SECRET:notification-service-secret}