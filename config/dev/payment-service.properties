server.port=8084

# ============ ZIPKIN CONFIGS ================
# Turns on distributed tracing in the service.
# If this is false, no spans are created, nothing is sent to Zipkin.
management.tracing.enabled=true
# Defines where spans are sent.
# Zipkin will not receive any data if this is missing or wrong.
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Controls how many requests are traced.
management.tracing.sampling.probability=1.0
# Defines how trace IDs are passed between services.
# b3 = Zipkin standard
# Required if you want consistent traces across services
management.tracing.propagation.type=b3
# Traces outgoing HTTP calls (RestTemplate, WebClient, Feign).
management.tracing.instrumentation.http.client.enabled=true
# Traces incoming HTTP requests to your service.
management.tracing.instrumentation.http.server.enabled=true
# Adds traceId & spanId to logs.
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]

# ============ Eureka ============
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ============ gRPC SERVER ================
grpc.server.port=9095

# ============ gRPC Server mTLS ============
grpc.server.security.enabled=${GRPC_MTLS_ENABLED:true}
grpc.server.security.certificate-chain=classpath:certs/payment-service.crt
grpc.server.security.private-key=classpath:certs/payment-service.key
grpc.server.security.trust-certificate=classpath:certs/ca.crt

# ============ JWT Security ============
security.jwt.enabled=true
security.jwt.issuer-uri=${SECURITY_JWT_ISSUER_URI:http://localhost:8180/realms/booking-platform}
security.jwt.jwk-set-uri=${SECURITY_JWT_JWK_SET_URI:http://localhost:8180/realms/booking-platform/protocol/openid-connect/certs}

# ============ Database ============
spring.datasource.url=jdbc:postgresql://localhost:5432/paymentdb
spring.datasource.username=${DB_POSTGRES_USERNAME:admin}
spring.datasource.password=${DB_POSTGRES_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============ Flyway (schema management) ============
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============ JPA / Hibernate ============
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============ Redis (Token Blacklist) ============
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ============ Kafka ================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=payment-service-group
spring.kafka.consumer.auto-offset-reset=earliest

# ============ Payment Gateway ============
# "stripe" = real Stripe SDK calls (test or live mode depending on API key)
# "mock"   = auto-succeeds after 2s delay (default if property is missing)
payment.gateway.type=stripe
stripe.api-key=${STRIPE_SECRET_KEY:sk_test_51T4OGcDOJiA9K1kipI0qxGhKSinIdAxmLvOtwxqfQbOKveAvVL5VTwTZ1DKpcOF5S4jtPiH6zMaa26HXxWCPUMC200kU7IQjGN}

# ============ Resilience4j - Circuit Breaker (P4-03) ============
# Sliding window: evaluate last 10 calls
resilience4j.circuitbreaker.instances.stripe.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.stripe.sliding-window-size=10
# OPEN when >= 50% of the last 10 calls fail (i.e. 5 failures)
resilience4j.circuitbreaker.instances.stripe.failure-rate-threshold=50
# Need at least 5 calls before circuit breaker starts evaluating
resilience4j.circuitbreaker.instances.stripe.minimum-number-of-calls=5
# Stay OPEN for 30 seconds, then transition to HALF_OPEN
resilience4j.circuitbreaker.instances.stripe.wait-duration-in-open-state=30s
# In HALF_OPEN, allow 3 probe calls to test if Stripe is back
resilience4j.circuitbreaker.instances.stripe.permitted-number-of-calls-in-half-open-state=3
# Auto-transition from OPEN to HALF_OPEN (don't wait for a call to trigger it)
resilience4j.circuitbreaker.instances.stripe.automatic-transition-from-open-to-half-open-enabled=true

# ============ Resilience4j - Retry (P4-03) ============
# 3 total attempts (1 initial + 2 retries), exponential backoff: 1s, 2s
resilience4j.retry.instances.stripe.max-attempts=3
resilience4j.retry.instances.stripe.wait-duration=1s
resilience4j.retry.instances.stripe.enable-exponential-backoff=true
resilience4j.retry.instances.stripe.exponential-backoff-multiplier=2

# ============ Resilience4j - Time Limiter (P4-03) ============
# Cancel the future if Stripe doesn't respond within 10 seconds
resilience4j.timelimiter.instances.stripe.timeout-duration=10s
resilience4j.timelimiter.instances.stripe.cancel-running-future=true

# ============ Resilience4j - Bulkhead (P4-03) ============
# Max 20 concurrent calls to Stripe (semaphore-based)
resilience4j.bulkhead.instances.stripe.max-concurrent-calls=20
resilience4j.bulkhead.instances.stripe.max-wait-duration=0ms

# ============ Actuator ================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents,retries,retryevents,bulkheads,timelimiters
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
resilience4j.circuitbreaker.instances.stripe.register-health-indicator=true

# ============ Transactional Outbox (P4-04) ============
# How often (ms) the poller checks for unpublished outbox events
outbox.poll.interval=500
# How often (ms) the cleanup job runs to delete old published events
outbox.cleanup.interval=3600000
# How long (hours) to keep published events before cleanup deletes them
outbox.cleanup.retention-hours=24

# ============ Logging ================
logging.file.name=${LOG_PATH:/tmp}/logs/payment-service.log

# ============ Mocks ==================
# If using the "mock" payment gateway, this controls how long it takes to respond (simulate real API latency).
payment.gateway.mock.delay-ms=2000
