server.port=8082

# ============ MongoDB ================
spring.data.mongodb.uri=mongodb://${DB_MONGO_USERNAME}:${DB_MONGO_PASSWORD}@localhost:27017/eventdb?authSource=admin

# ============ gRPC SERVER ================
grpc.server.port=9093

# ============ gRPC Server mTLS ============
# Enable mTLS for gRPC server (set to false to use plaintext)
grpc.server.security.enabled=${GRPC_MTLS_ENABLED:true}
grpc.server.security.certificate-chain=classpath:certs/event-service.crt
grpc.server.security.private-key=classpath:certs/event-service.key
grpc.server.security.trust-certificate=classpath:certs/ca.crt

# ============ JWT Security ============
security.jwt.enabled=true
security.jwt.issuer-uri=${SECURITY_JWT_ISSUER_URI:http://localhost:8180/realms/booking-platform}
security.jwt.jwk-set-uri=${SECURITY_JWT_JWK_SET_URI:http://localhost:8180/realms/booking-platform/protocol/openid-connect/certs}

# ============ Redis ============
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ============ Cache (Redis) ============
# Cache type — tells Spring Boot to use Redis as the cache backend
spring.cache.type=redis
# TTLs are defined per-cache in CacheConfig.java
# Featured events refresh job interval (ms) — default 2 minutes
cache.featured-events.refresh-delay-ms=120000
cache.featured-events.limit=20

# ============ Pagination ============
event-service.pagination.default-page-size=20
event-service.pagination.max-page-size=100
event-service.pagination.max-skippable-results=5000

# ============ ZIPKIN CONFIGS ================
# Turns on distributed tracing in the service.
# If this is false, no spans are created, nothing is sent to Zipkin.
management.tracing.enabled=true
# Defines where spans are sent.
# Zipkin will not receive any data if this is missing or wrong.
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Controls how many requests are traced.
management.tracing.sampling.probability=1.0
# Defines how trace IDs are passed between services.
# b3 = Zipkin standard
# Required if you want consistent traces across services
management.tracing.propagation.type=b3
# Traces outgoing HTTP calls (RestTemplate, WebClient, Feign).
management.tracing.instrumentation.http.client.enabled=true
# Traces incoming HTTP requests to your service.
management.tracing.instrumentation.http.server.enabled=true
# Adds traceId & spanId to logs.
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]

# ============ Eureka ============
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ============ Kafka Producer ================
spring.kafka.bootstrap-servers=localhost:9092
# Key: event ID as plain string
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# Value: protobuf binary — handled by our shared ProtobufSerializer
spring.kafka.producer.value-serializer=com.booking.platform.common.events.serialization.ProtobufSerializer
# All other producer settings (acks, retries, batch-size, linger, compression, etc.)
# are configured programmatically in KafkaProducerConfig.java

# ============ Actuator ================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ============ Logging ================
logging.file.name=${LOG_PATH:/tmp}/logs/event-service.log
