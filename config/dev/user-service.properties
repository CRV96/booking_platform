server.port=8081

# ============ DATABASE (Keycloak's PostgreSQL) ================
spring.datasource.url=jdbc:postgresql://localhost:5432/userdb
spring.datasource.username=${DB_POSTGRES_USERNAME:admin}
spring.datasource.password=${DB_POSTGRES_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - READ ONLY (don't let Hibernate modify Keycloak's schema)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# ============ gRPC SERVER ================
grpc.server.port=9091

# ============ KEYCLOAK ADMIN CLIENT (for user management) ================
keycloak.admin.server-url=http://localhost:8180
keycloak.admin.realm=booking-platform
keycloak.admin.client-id=user-service-admin
keycloak.admin.client-secret=${USER_SERVICE_KEYCLOAK_CLIENT_SECRET:}

# ============ KEYCLOAK AUTH (for user authentication) ================
keycloak.auth.server-url=http://localhost:8180
keycloak.auth.realm=booking-platform
keycloak.auth.client-id=booking-app

# ============ ZIPKIN CONFIGS ================
# Turns on distributed tracing in the service.
# If this is false, no spans are created, nothing is sent to Zipkin.
management.tracing.enabled=true
# Defines where spans are sent.
# Zipkin will not receive any data if this is missing or wrong.
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
# Controls how many requests are traced.
management.tracing.sampling.probability=1.0
# Defines how trace IDs are passed between services.
# b3 = Zipkin standard
# Required if you want consistent traces across services
management.tracing.propagation.type=b3
# Traces outgoing HTTP calls (RestTemplate, WebClient, Feign).
management.tracing.instrumentation.http.client.enabled=true
# Traces incoming HTTP requests to your service.
management.tracing.instrumentation.http.server.enabled=true
# Adds traceId & spanId to logs.
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]

# ============ Eureka ============
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ============ Validation ============
validation.email-pattern=^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$
validation.min-password-length=8
validation.max-password-length=128
validation.max-name-length=100
validation.max-email-length=255

# ============ JWT Security ============
security.jwt.enabled=true