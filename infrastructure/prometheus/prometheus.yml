global:
  # How often Prometheus scrapes each target
  scrape_interval: 15s
  # How often Prometheus re-evaluates alerting rules
  evaluation_interval: 15s

scrape_configs:

  # ── Prometheus itself ────────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: [ localhost:9090 ]

  # ── Spring Boot Services ─────────────────────────────────────────────────────
  # Each service exposes /actuator/prometheus (enabled by micrometer-registry-prometheus).
  # Prometheus scrapes these endpoints every 15s and stores the metric values.
  # host.docker.internal resolves to the host machine IP from inside the Docker container,
  # allowing Prometheus (running in Docker) to reach services running locally.

  - job_name: eureka-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ host.docker.internal:8761 ]

  - job_name: event-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ host.docker.internal:8082 ]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ host.docker.internal:8086 ]

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ host.docker.internal:8081 ]

  - job_name: booking-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ host.docker.internal:8083 ]

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ host.docker.internal:8084 ]

  - job_name: ticket-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ host.docker.internal:8087 ]

  - job_name: analytics-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ host.docker.internal:8087 ]

  - job_name: graphql-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ host.docker.internal:8080 ]
