server:
  http_listen_port: 9080
  grpc_listen_port: 0

# Where Promtail stores its position in each log file
# Allows it to resume from where it left off after restart
positions:
  filename: /tmp/positions.yaml

# Where to send logs — our Loki container
clients:
  - url: http://booking-loki:3100/loki/api/v1/push

scrape_configs:

  # ── Docker container logs ─────────────────────────────────────────────────
  # Promtail reads logs directly from the Docker socket.
  # It discovers all running containers automatically and applies labels
  # based on Docker container metadata (name, image, compose service, etc).
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Only collect logs from containers in our booking-network
          - name: network
            values: [ booking-network ]

    relabel_configs:
      # Use the Docker container name as the "container" label
      - source_labels: [ __meta_docker_container_name ]
        regex: /(.*)
        target_label: container

      # Use the Docker Compose service name as the "service" label
      # This is what you filter by in Grafana: {service="notification-service"}
      - source_labels: [ __meta_docker_container_label_com_docker_compose_service ]
        target_label: service

      # Keep the Docker image name for reference
      - source_labels: [ __meta_docker_container_label_com_docker_compose_project ]
        target_label: project

    # Parse the log line to extract the log level as a label
    # This lets you filter: {service="event-service"} | level="ERROR"
    pipeline_stages:
      - json:
          expressions:
            level: level
      - labels:
          level:

  # ── Host microservice logs (JSON files written by logback) ────────────────
  # Services run on the host machine (not in Docker), so they can't be
  # discovered via the Docker socket. Instead, they write JSON log files
  # to a shared /logs folder that is bind-mounted into this container.
  # Promtail tails those files and ships them to Loki just like Docker logs.
  - job_name: microservices
    static_configs:
      - targets:
          - localhost
        labels:
          job: microservices
          # service is set to a placeholder — overridden per-line by pipeline_stages below
          service: host-service
          __path__: /logs/*.log

    pipeline_stages:
      # Each line is a JSON object from LogstashEncoder.
      # Extract the "service" field that LogstashEncoder embeds via <customFields>.
      # This gives us the real service name (e.g. "event-service") per log line.
      - json:
          expressions:
            extracted_service: service
            level: level
            logger: logger_name
            trace_id: traceId
            span_id: spanId

      # Promote extracted fields to Loki labels for filtering
      # {service="event-service"} and {level="ERROR"} now both work
      - labels:
          service: extracted_service
          level:
