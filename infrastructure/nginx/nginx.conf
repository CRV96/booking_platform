worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ─── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── GraphQL Gateway upstream ──────────────────────────────────────────────
    upstream graphql_gateway {
        server graphql-gateway:8080;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://graphql_gateway;

            # Stamp the real client IP — overwrites any value the client may have
            # set, preventing X-Forwarded-For spoofing for rate limit bypass.
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Real-IP         $remote_addr;

            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port  $server_port;

            # Disable response buffering — allows GraphQL responses to stream
            # through without nginx holding the full body in memory first.
            proxy_buffering off;

            # Timeouts — generous for GraphQL mutations that hit multiple services
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
