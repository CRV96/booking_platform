name: bkg-platform

services:

# ==================== DATABASES ====================
  postgres:
    image: postgres:16-alpine
    container_name: bkg-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_MULTIPLE_DATABASES: userdb,bookingdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin && psql -U admin -d userdb -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bkg-network

  mongodb:
    image: mongo:7
    container_name: bkg-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bkg-network

  redis:
    image: redis:7-alpine
    container_name: bkg-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bkg-network

# ==================== MESSAGING ====================
  kafka:
    image: apache/kafka:3.9.0
    container_name: bkg-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners
      # PLAINTEXT      → used by host-machine clients (your app, CLI tools) via localhost:9092
      # PLAINTEXT_INTERNAL → used by Docker-internal clients (Kafka UI) via bkg-kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://bkg-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topics
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Cluster ID (required for KRaft)
      CLUSTER_ID: "booking-platform-kafka-cluster"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - bkg-network

# ==================== SECURITY ====================
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: bkg-keycloak
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://bkg-postgres:5432/userdb
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: admin

      KC_PROXY: edge
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: false

      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"

    volumes:
      - ../keycloak/realm:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bkg-network
# ==================== OBSERVABILITY ====================
  zipkin:
    image: openzipkin/zipkin:3
    container_name: bkg-zipkin
    ports:
      - "9411:9411"
    environment:
      STORAGE_TYPE: mem
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bkg-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: bkg-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    extra_hosts:
      # Allows Prometheus (inside Docker) to reach services running on the host machine
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bkg-network

  loki:
    image: grafana/loki:3.3.0
    container_name: bkg-loki
    ports:
      - "3100:3100"
    volumes:
      - ../loki/loki.yml:/etc/loki/loki.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bkg-network

  promtail:
    image: grafana/promtail:3.3.0
    container_name: bkg-promtail
    volumes:
      - ../promtail/promtail.yml:/etc/promtail/promtail.yml
      # Docker socket — allows Promtail to read container logs directly
      - /var/run/docker.sock:/var/run/docker.sock
      # Host microservice log files — services write JSON logs here via logback
      # Promtail tails these files and ships them to Loki
      # LOG_PATH must be exported before running docker-compose (see docs/initialization_READ_ME.md)
      - ${LOG_PATH:-/tmp}/logs:/logs:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - bkg-network

  grafana:
    image: grafana/grafana:11.3.0
    container_name: bkg-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_EMAIL: admin@booking-platform.com
    volumes:
      # Auto-provisions Prometheus, Loki and Zipkin datasources on first start
      - ../grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bkg-network


# ==================== DEV TOOLS ====================
  mongo-express:
    image: mongo-express:latest
    container_name: bkg-mongo-express
    ports:
      - "8090:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@bkg-mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bkg-network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: bkg-redisinsight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bkg-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: bkg-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - bkg-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bkg-kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: booking-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: bkg-kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bkg-network

  sonarqube:
    image: sonarqube:10-community
    container_name: bkg-sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - bkg-network

# ==================== VOLUMES ====================
volumes:
  postgres_data:
    name: bkg-postgres-data
  mongodb_data:
    name: bkg-mongodb-data
  redis_data:
    name: bkg-redis-data
  kafka_data:
    name: bkg-kafka-data
  sonarqube_data:
    name: bkg-sonarqube-data
  sonarqube_extensions:
    name: bkg-sonarqube-extensions
  sonarqube_logs:
    name: bkg-sonarqube-logs
  prometheus_data:
    name: bkg-prometheus-data
  grafana_data:
    name: bkg-grafana-data
  loki_data:
    name: bkg-loki-data

# ==================== NETWORKS ====================
networks:
  bkg-network:
    name: bkg-network
    driver: bridge
