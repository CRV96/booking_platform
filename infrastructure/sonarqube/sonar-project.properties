# =============================================================================
# SonarQube Configuration for Booking Platform
# =============================================================================
# Run from this folder: cd infrastructure/sonarqube && sonar-scanner
# Or use Maven: mvn clean verify sonar:sonar -Dsonar.token=YOUR_TOKEN
# =============================================================================

sonar.projectKey=Booking-Platform
sonar.projectName=Booking Platform
sonar.projectVersion=1.0

# Project root (relative to this file location)
sonar.projectBaseDir=../..

# Multi-module project
sonar.modules=analytics-service,booking-service,config-service,eureka-service,event-service,graphql-gateway,notification-service,payment-service,ticket-service,user-service

# Module base directories (relative to projectBaseDir)
analytics-service.sonar.projectBaseDir=services/analytics-service
booking-service.sonar.projectBaseDir=services/booking-service
config-service.sonar.projectBaseDir=services/config-service
eureka-service.sonar.projectBaseDir=services/eureka-service
event-service.sonar.projectBaseDir=services/event-service
graphql-gateway.sonar.projectBaseDir=services/graphql-gateway
notification-service.sonar.projectBaseDir=services/notification-service
payment-service.sonar.projectBaseDir=services/payment-service
ticket-service.sonar.projectBaseDir=services/ticket-service
user-service.sonar.projectBaseDir=services/user-service

# Default module settings (relative to each module's baseDir)
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.junit.reportPaths=target/surefire-reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Global settings
sonar.sourceEncoding=UTF-8
sonar.java.source=21

# Exclusions
sonar.exclusions=**/target/**,**/node_modules/**
sonar.test.exclusions=**/target/**

# Coverage exclusions (DTOs, configs, entities don't need coverage)
sonar.coverage.exclusions=**/dto/**,**/config/**,**/entity/**,**/model/**,**/*Application.java

# SonarQube Server
sonar.host.url=http://localhost:9000
