name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ==================== BUILD ====================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile
        run: mvn clean compile -B

  # ==================== TEST ====================
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Test with coverage
        run: mvn clean verify -B

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          retention-days: 1
          path: |
            **/target/classes/
            **/target/site/jacoco/
            **/target/surefire-reports/

  # ==================== SONARQUBE ====================
  sonar:
    name: SonarQube Analysis
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn sonar:sonar -B
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  # ==================== DOCKER ====================
  docker:
    name: Docker Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: >
          docker build
          -f infrastructure/docker/Dockerfile.service
          --build-arg SERVICE_NAME=user-service
          -t booking-platform/user-service:ci
          .
